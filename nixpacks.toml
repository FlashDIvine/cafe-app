# Railway Nixpacks Configuration for Laravel

[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.tokenizer", "php83Extensions.bcmath", "php83Extensions.fileinfo"]

[phases.build]
cmds = [
    "mkdir -p storage/framework/{sessions,views,cache}",
    "mkdir -p bootstrap/cache",
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build",
    "php artisan storage:link || true",
    "php artisan optimize"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
